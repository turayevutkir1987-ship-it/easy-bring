<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyBring FULL PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
header{padding:15px;background:#fff;text-align:center;font-weight:800}
input{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ddd}
button{padding:10px;border:none;border-radius:10px;background:#6a00ff;color:#fff;font-weight:700;width:100%}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px}
.admin{background:#fff;padding:10px;margin:10px;border-radius:10px}
.order{background:#fff;margin:10px;padding:10px;border-radius:10px}
</style>
</head>

<body>

<header>EasyBring PRO 🚀</header>

<!-- AUTH -->
<div id="auth">
<h3>Kirish / Ro‘yxatdan o‘tish</h3>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Parol">
<button onclick="app.register()">Ro‘yxatdan o‘tish</button>
<button onclick="app.login()">Kirish</button>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none" class="admin">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Mahsulot nomi">
<input id="pprice" placeholder="Narxi">
<input id="pimg" placeholder="Rasm URL">
<button onclick="app.addProduct()">Qo‘shish</button>

<h3>Buyurtmalar</h3>
<div id="orders"></div>
</div>

<!-- SHOP GRID -->
<div id="shop" class="grid"></div>

<!-- CHECKOUT -->
<button onclick="app.checkout()">Buyurtma berish</button>

</div>

<script type="module">

// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔑 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);
const auth = getAuth(appF);

// 🤖 TELEGRAM BOT
const TOKEN = "YOUR_BOT_TOKEN";
const CHAT_ID = "YOUR_CHAT_ID";

// 🚀 APP
window.app = {

db: [],
cart: [],
user: null,
role: "user",

// 🔐 REGISTER
async register(){
    const e = email.value;
    const p = pass.value;
    await createUserWithEmailAndPassword(auth, e, p);
    alert("Ro‘yxatdan o‘tildi!");
},

// 🔐 LOGIN
async login(){
    const e = email.value;
    const p = pass.value;
    const res = await signInWithEmailAndPassword(auth, e, p);
    this.user = res.user;

    if(e === "admin@gmail.com") this.role = "admin";

    auth.style.display = "none";
    app.style.display = "block";

    if(this.role === "admin") adminPanel.style.display = "block";

    this.loadProducts();
    if(this.role === "admin") this.loadOrders();
},

// 📦 PRODUCTS
async addProduct(){
    await addDoc(collection(db, "products"), {
        name: pname.value,
        price: Number(pprice.value),
        img: pimg.value
    });
    alert("Mahsulot qo‘shildi!");
    this.loadProducts();
},

async loadProducts(){
    const snap = await getDocs(collection(db, "products"));
    this.db = [];
    snap.forEach(d => this.db.push({id: d.id, ...d.data()}));
    this.render();
},

render(){
    shop.innerHTML = this.db.map(x => `
        <div class="card">
            <img src="${x.img}" width="100%">
            <b>${x.name}</b><br>
            ${x.price} so'm<br>
            <button onclick="app.add('${x.id}')">Savatga</button>
        </div>
    `).join("");
},

add(id){
    const item = this.db.find(x => x.id === id);
    const exist = this.cart.find(x => x.id === id);
    if(exist) exist.qty++;
    else this.cart.push({...item, qty:1});
    alert("Savatga qo‘shildi!");
},

// 🛒 CHECKOUT + TELEGRAM
async checkout(){
    if(this.cart.length === 0){alert("Savat bo‘sh!"); return;}

    let total = 0;
    this.cart.forEach(x => total += x.price * x.qty);

    const order = {
        user: this.user.email,
        items: this.cart,
        total,
        status: "pending",
        time: new Date().toLocaleString()
    };

    await addDoc(collection(db, "orders"), order);

    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({chat_id: CHAT_ID, text: JSON.stringify(order, null, 2)})
    });

    alert("Buyurtma yuborildi!");
    this.cart = [];
},

// 📑 ADMIN ORDERS
async loadOrders(){
    const snap = await getDocs(collection(db, "orders"));
    orders.innerHTML = "";
    snap.forEach(d => {
        const o = d.data();
        orders.innerHTML += `
        <div class="order">
            <b>${o.user}</b><br>
            ${o.total} so'm<br>
            Status: ${o.status}<br>
            <button onclick="app.updateStatus('${d.id}','accepted')">Tasdiqlash</button>
            <button onclick="app.updateStatus('${d.id}','delivered')">Yetkazildi</button>
        </div>`;
    });
},

async updateStatus(id, status){
    await updateDoc(doc(db, "orders", id), {status});
    this.loadOrders();
}

};

</script>
</body>
</html>
