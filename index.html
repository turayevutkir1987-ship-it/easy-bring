<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easy-Bring | Ultimate OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #ff3d00;
            --primary: #6366f1;
            --bg: #050505;
            --surface: #121212;
            --glass: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
            --success: #00e676;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; padding-bottom: 100px; }

        /* --- 💎 PREMIUM ANIMATIONS --- */
        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        /* --- 📱 UI COMPONENTS --- */
        header { padding: 25px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; background: rgba(5,5,5,0.8); backdrop-filter: blur(10px); }
        .logo { font-weight: 800; font-size: 22px; background: linear-gradient(90deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-box { margin: 0 20px 20px; position: relative; }
        .search-box input { width: 100%; padding: 15px 45px; background: var(--surface); border: 1px solid var(--glass); border-radius: 18px; color: white; outline: none; transition: 0.3s; }
        .search-box input:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }

        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 0 20px 20px; scrollbar-width: none; }
        .cat-chip { padding: 10px 20px; background: var(--surface); border-radius: 30px; white-space: nowrap; font-size: 13px; font-weight: 600; cursor: pointer; border: 1px solid var(--glass); }
        .cat-chip.active { background: var(--primary); border-color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 0 20px; }
        .product-card { background: var(--surface); border-radius: 24px; padding: 12px; border: 1px solid var(--glass); animation: slideIn 0.5s ease; position: relative; }
        .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 20px; margin-bottom: 10px; }
        .price-badge { position: absolute; top: 20px; right: 20px; background: var(--primary); padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* --- 🛒 CART & DRAWER --- */
        .cart-item { display: flex; align-items: center; gap: 15px; background: var(--glass); padding: 15px; border-radius: 20px; margin-bottom: 10px; }
        .cart-item img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; }

        /* --- 🕹 NAVIGATION --- */
        nav { position: fixed; bottom: 25px; left: 20px; right: 20px; height: 75px; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(20px); border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid var(--glass); z-index: 1000; }
        .nav-link { color: #555; text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 10px; font-weight: 600; gap: 5px; transition: 0.3s; }
        .nav-link.active { color: var(--primary); }
        .nav-link i { font-size: 24px; }

        /* --- 💼 ADMIN PANEL --- */
        .admin-form { padding: 25px; background: var(--surface); border-radius: 30px; border: 1px solid var(--glass); mar

gin: 20px; }
        input, select, textarea { width: 100%; padding: 15px; background: rgba(255,255,255,0.03); border: 1px solid var(--glass); border-radius: 15px; color: white; margin-bottom: 15px; font-size: 14px; }
        .btn-main { width: 100%; padding: 18px; border-radius: 18px; border: none; background: linear-gradient(135deg, var(--primary), #4f46e5); color: white; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-main:active { transform: scale(0.95); }

        section { display: none; }
        section.active { display: block; }

        .cart-count { position: absolute; top: -5px; right: -5px; background: var(--accent); color: white; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">EASY BRING PRO</div>
        <div id="status-dot" style="width: 10px; height: 10px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success)"></div>
    </header>

    <div id="discovery-ui">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Mahsulotlarni qidirish..." oninput="app.search()">
        </div>
        <div class="categories">
            <div class="cat-chip active" onclick="app.filterCat('Barchasi', this)">Barchasi</div>
            <div class="cat-chip" onclick="app.filterCat('Elektronika', this)">Elektronika</div>
            <div class="cat-chip" onclick="app.filterCat('Kiyimlar', this)">Kiyimlar</div>
            <div class="cat-chip" onclick="app.filterCat('Oziq-ovqat', this)">Oziq-ovqat</div>
        </div>
    </div>

    <main id="app-router">
        
        <section id="shop" class="active">
            <div class="grid" id="product-grid"></div>
        </section>

        <section id="cart" style="padding: 20px;">
            <h2 style="margin-bottom: 20px;">Sizning savatingiz</h2>
            <div id="cart-list"></div>
            <div id="cart-footer" style="margin-top: 30px; display:none;">
                <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:20px; font-weight:800;">
                    <span>Jami:</span> <span id="total-price">0</span>
                </div>
                <button class="btn-main" onclick="app.checkout()">Buyurtmani tasdiqlash</button>
            </div>
        </section>

        <section id="admin">
            <div class="admin-form">
                <h3 style="margin-bottom:20px">Yangi mahsulot qo'shish</h3>
                <input type="text" id="p-title" placeholder="Mahsulot nomi">
                <input type="number" id="p-price" placeholder="Narxi (so'm)">
                <select id="p-cat">
                    <option value="Elektronika">Elektronika</option>
                    <option value="Kiyimlar">Kiyimlar</option>
                    <option value="Oziq-ovqat">Oziq-ovqat</option>
                </select>
                <input type="file" id="p-file" accept="image/*">
                <button class="btn-main" onclick="app.createProduct()">Bazaga yozish</button>
            </div>
        </section>

    </main>

    <nav>
        <div class="nav-link active" onclick="app.route('shop', this)">
            <i>🏠</i><span>Do'kon</span>
        </div>
        <div class="nav-link" onclick="app.route('cart', this)" style="position:relative">
            <i>🛒</i><span>Savat</span>
            <div id="cart-dot" class="cart-count" style="display:none">0</div>
        </div>
        <div class="nav-link" onclick="app.route('admin', this)">
            <i>🛠️</i><span>Admin</span>
        </div>
    </nav>

    <script>
        const app = {
            tg: window.Telegram.WebApp,
            products: JSON.parse(localStorage.getItem('eb_v3_products')) || [],
            cart: [],
            currentFilter: 'Barchasi',

            init() {
                this.tg.expand();
                this.tg.enableClosingConfirmation();
                this.renderProducts();
            },



            // Navigation System
            route(id, el) {
                document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
                document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                el.classList.add('active');
                
                // Hide/Show Search UI
                document.getElementById('discovery-ui').style.display = id === 'shop' ? 'block' : 'none';
                
                if(id === 'cart') this.renderCart();
                this.tg.HapticFeedback.impactOccurred('light');
            },

            // Product Logic
            renderProducts(data = this.products) {
                const grid = document.getElementById('product-grid');
                grid.innerHTML = data.map(p => `
                    <div class="product-card">
                        <div class="price-badge">${p.price.toLocaleString()} so'm</div>
                        <img src="${p.img || 'https://via.placeholder.com/150'}">
                        <div style="font-size:10px; color:var(--primary); font-weight:800; margin-bottom:5px">${p.category}</div>
                        <div style="font-weight:600; font-size:14px; margin-bottom:12px">${p.name}</div>
                        <button class="btn-main" style="padding:10px; font-size:12px" onclick="app.addToCart(${p.id})">Savatga</button>
                    </div>
                `).join('');
            },

            filterCat(cat, el) {
                document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
                this.currentFilter = cat;
                this.search();
            },

            search() {
                const query = document.getElementById('search-input').value.toLowerCase();
                const filtered = this.products.filter(p => {
                    const matchCat = this.currentFilter === 'Barchasi' || p.category === this.currentFilter;
                    const matchSearch = p.name.toLowerCase().includes(query);
                    return matchCat && matchSearch;
                });
                this.renderProducts(filtered);
            },

            // Admin Logic
            createProduct() {
                const name = document.getElementById('p-title').value;
                const price = parseInt(document.getElementById('p-price').value);
                const category = document.getElementById('p-cat').value;
                const file = document.getElementById('p-file').files[0];

                if(!name || !price) return this.tg.showAlert("Ma'lumotlarni to'ldiring!");

                const reader = new FileReader();
                reader.onload = (e) => {
                    const product = { id: Date.now(), name, price, category, img: e.target.result };
                    this.products.unshift(product);
                    localStorage.setItem('eb_v3_products', JSON.stringify(this.products));
                    this.tg.showPopup({ title: "Muvaffaqiyatli", message: "Mahsulot bazaga qo'shildi!" });
                    this.renderProducts();
                    this.route('shop', document.querySelector('.nav-link'));
                };
                if(file) reader.readAsDataURL(file);
                else reader.onload({target:{result:null}});
            },

            // Cart Logic
            addToCart(id) {
                const p = this.products.find(x => x.id === id);
                this.cart.push(p);
                this.updateCartBadge();
                this.tg.HapticFeedback.notificationOccurred('success');
            },

            updateCartBadge() {
                const dot = document.getElementById('cart-dot');
                if(this.cart.length > 0) {
                    dot.style.display = 'flex';
                    dot.innerText = this.cart.length;
                }
            },

            renderCart() {
                const list = document.getElementBy

Id('cart-list');
                const footer = document.getElementById('cart-footer');
                if(this.cart.length === 0) {
                    list.innerHTML = "<p style='text-align:center; opacity:0.5; margin-top:50px'>Savat bo'sh</p>";
                    footer.style.display = 'none';
                    return;
                }
                
                footer.style.display = 'block';
                let total = 0;
                list.innerHTML = this.cart.map((item, index) => {
                    total += item.price;
                    return `
                        <div class="cart-item">
                            <img src="${item.img}">
                            <div style="flex:1">
                                <div style="font-weight:600">${item.name}</div>
                                <div style="color:var(--primary); font-size:13px">${item.price.toLocaleString()} so'm</div>
                            </div>
                            <button onclick="app.removeItem(${index})" style="background:none; border:none; color:red; font-size:20px">×</button>
                        </div>
                    `;
                }).join('');
                document.getElementById('total-price').innerText = total.toLocaleString() + " so'm";
            },

            removeItem(index) {
                this.cart.splice(index, 1);
                this.renderCart();
                this.updateCartBadge();
                if(this.cart.length === 0) document.getElementById('cart-dot').style.display = 'none';
            },

            checkout() {
                this.tg.showConfirm("Buyurtmani tasdiqlaysizmi?", (ok) => {
                    if(ok) {
                        this.tg.MainButton.setText("BUYURTMA YUBORILDI ✅");
                        this.tg.MainButton.show();
                        setTimeout(() => this.tg.MainButton.hide(), 3000);
                        
                        // Telegramga ma'lumot yuborish (Haqiqiy bot uchun)
                        const data = {
                            user: this.tg.initDataUnsafe?.user?.first_name,
                            items: this.cart,
                            total: document.getElementById('total-price').innerText
                        };
                        this.tg.sendData(JSON.stringify(data));
                        
                        this.cart = [];
                        this.renderCart();
                        this.updateCartBadge();
                        document.getElementById('cart-dot').style.display = 'none';
                    }
                });
            }
        };

        app.init();
    </script>
</body>
</html>
