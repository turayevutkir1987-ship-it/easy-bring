<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Easy-Bring | Enterprise Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #7000ff; --secondary: #00d1b2; --bg: #f5f7fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Main UI */
        .main-content { flex: 1; display: flex; flex-direction: column; }
        header { background: white; padding: 15px 25px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { color: var(--primary); font-size: 20px; font-weight: 800; }
        
        .content-body { padding: 20px; overflow-y: auto; flex: 1; padding-bottom: 80px; /* Navigatsiya uchun joy */ }
        section { display: none; }
        section.active { display: block; animation: fadeIn 0.3s; }

        /* Products Grid */
        .products-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .product-card { background: white; border-radius: 20px; padding: 12px; border: 1px solid #eee; position: relative; overflow: hidden; }
        .product-card:active { transform: scale(0.97); transition: 0.1s; }
        .product-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 15px; }
        
        /* Buttons */
        .btn { width: 100%; padding: 10px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 13px; }
        .btn-p { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(112, 0, 255, 0.2); }
        .btn-p:active { background: #6000e0; }
        
        /* Forms */
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1.5px solid #eee; border-radius: 10px; outline: none; background: white; font-size: 14px; }
        input:focus, select:focus { border-color: var(--primary); }

        /* Navigation Bar (Mobile) */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.03); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #888; text-decoration: none; cursor: pointer; transition: 0.2s; font-size: 10px; }
        .nav-item.active { color: var(--primary); font-weight: 600; }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="logo">🚀 Easy-Bring</div>
        <div id="user-info" style="font-size: 12px; font-weight: 500;"></div>
    </header>

    <div class="main-content">
        <div class="content-body">
            <section id="sec-shop" class="active">
                <h2 style="margin-bottom: 15px; font-size: 18px;">Do'kon</h2>
                <div id="grid-shop" class="products-grid"></div>
            </section>
            
            <section id="sec-cart">
                <h2 style="margin-bottom: 15px; font-size: 18px;">Savat</h2>
                <div id="list-cart"></div>
            </section>

            <section id="sec-admin">
                <div id="admin-panel" style="max-width: 450px; background:white; padding:25px; border-radius:20px; border: 1px solid #eee">
                    <h3>Yangi mahsulot</h3>
                    <p style="font-size:12px; color:gray; margin-bottom:15px;">Mahsulot ma'lumotlarini kiriting.</p>
                    <input type="text" id="p-name" placeholder="Mahsulot nomi">
                    <input type="number" id="p-price" placeholder="Narxi">
                    <div style="font-size:11px; color:#888; margin-bottom:5px">Mahsulot rasmi:</div>
                    <input type="file" id="p-img" accept="image/*" style="border:none; padding: 5px">
                    <button class="btn btn-p" onclick="addProduct()">Sotuvga chiqarish</button>
                </div>
            </section>
        </div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" onclick="nav('sec-shop', this)">
            <i>🏠</i>
            <span>Do'kon</span>
        </div>
        <div class="nav-item" onclick="nav('sec-cart', this)">
            <div style="position:relative">
                <i>🛒</i>
                <span id="cart-badge" style="position:absolute; top:-5px; right:-10px; background:red; color:white; font-size:9px; padding:2px 5px; border-radius:10px; display:none">0</span>
            </div>
            <span>Savat</span>
        </div>
        <div class="nav-item" onclick="nav('sec-admin', this)">
            <i>💼</i>
            <span>Admin</span>
        </div>
    </nav>

    <script>
        // --- CONFIG ---
        const tg = window.Telegram.WebApp;
        if (tg) {
            tg.expand(); // Botni to'liq ekranga ochish
            const userName = tg.initDataUnsafe?.user?.first_name || "Mehmon";
            document.getElementById('user-info').innerText = userName;
        }

        // --- DATA STATE ---
        let state = {
            products: JSON.parse(localStorage.getItem('eb_prods')) || [],
            cart: [],
            imgTemp: null
        };

        // --- CORE FUNCTIONS ---

        // Navigatsiya
        function nav(secId, el) {
            document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(secId).classList.add('active');
            el.classList.add('active');
            
            if(secId === 'sec-shop') renderProducts();
            if(secId === 'sec-cart') renderCart();
        }

        // Rasm handler
        document.getElementById('p-img').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = () => state.imgTemp = reader.result;
            reader.readAsDataURL(e.target.files[0]);
        };

        // Mahsulot qo'shish (Admin)
        function addProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;

            if(!name || !price) return;

            const newP = {
                id: Date.now(),
                name,
                price: parseInt(price),
                img: state.imgTemp || 'https://via.placeholder.com/150'
            };

            state.products.push(newP);
            localStorage.setItem('eb_prods', JSON.stringify(state.products));
            
            // Tozalash
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-img').value = ''; // File inputni tozalash
            state.imgTemp = null;
            
            if(tg) tg.HapticFeedback.notificationOccurred('success');
            renderProducts();
            nav('sec-shop', document.querySelectorAll('.nav-item')[0]); // Asosiy sahifaga qaytish
        }

        // Mahsulotlarni chiqarish (Shop)
        function renderProducts() {
            const grid = document.getElementById('grid-shop');
            grid.innerHTML = state.products.map(p => `
                <div class="product-card">
                    <img src="${p.img}">
                    <div style="font-weight:600; font-size:14px; margin-top:8px">${p.name}</div>
                    <div style="font-weight:700; color:var(--primary); font-size:15px;">${p.price.toLocaleString()} so'm</div>
                    <button class="btn btn-p" style="padding: 8px; margin-top:8px; font-size:12px" 
                        onclick="addToCart(${p.id})">Savatga</button>
                </div>
            `).join('') || `<p style="grid-column: 1/3; text-align:center; padding:20px; color:#888;">Hozircha mahsulotlar yo'q.</p>`;
        }

        // Savatga qo'shish
        function addToCart(id) {
            const p = state.products.find(x => x.id === id);
            state.cart.push({...p, cartId: Date.now()});
            updateCartBadge();
            if(tg) tg.HapticFeedback.impactOccurred('medium');
        }

        // Savat nishonini yangilash
        function updateCartBadge() {
            const b = document.getElementById('cart-badge');
            if(state.cart.length > 0) {
                b.style.display = 'block';
                b.innerText = state.cart.length;
            } else {
                b.style.display = 'none';
            }
        }

        // Savatni chiqarish
        function renderCart() {
            const list = document.getElementById('list-cart');
            let total = 0;
            let html = state.cart.map(item => {
                total += item.price;
                return `
                    <div style="background:white; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #eee">
                        <div>
                            <div style="font-weight:600">${item.name}</div>
                            <div style="font-size:12px; color:var(--primary)">${item.price.toLocaleString()} so'm</div>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" style="border:none; background:none; color:red; font-size:16px; font-weight:bold; cursor:pointer">×</button>
                    </div>
                `;
            }).join('');

            if(state.cart.length > 0) {
                html += `
                    <div style="margin-top:20px; padding:15px; text-align:right">
                        <h3>Jami: ${total.toLocaleString()} so'm</h3>
                        <button class="btn btn-p" style="margin-top:15px; width: auto; padding: 12px 25px;" onclick="checkout()">Sotib olish</button>
                    </div>
                `;
            } else {
                html = "<p style='text-align:center; color:#888; padding: 20px;'>Savat bo'sh.</p>";
            }
            list.innerHTML = html;
        }

        // Savatdan o'chirish
        function removeFromCart(cartId) {
            state.cart = state.cart.filter(item => item.cartId !== cartId);
            renderCart();
            updateCartBadge();
        }

        // Xaridni rasmiylashtirish simulyatsiyasi
        function checkout() {
            if(tg) {
                tg.showConfirm("Xaridni tasdiqlaysizmi?", (ok) => {
                    if(ok) {
                        state.cart = [];
                        updateCartBadge();
                        nav('sec-shop', document.querySelectorAll('.nav-item')[0]);
                        tg.showAlert("Rahmat! Xarid muvaffaqiyatli amalga oshirildi.");
                    }
                });
            } else {
                if(confirm("Xaridni tasdiqlaysizmi?")) {
                    state.cart = [];
                    updateCartBadge();
                    nav('sec-shop', document.querySelectorAll('.nav-item')[0]);
                    alert("Xarid muvaffaqiyatli amalga oshirildi.");
                }
            }
        }

        // Init
        renderProducts();
        updateCartBadge();
    </script>
</body>
</html>
