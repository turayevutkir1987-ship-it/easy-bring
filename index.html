<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyBring Mini App PRO</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
header{padding:15px;background:#fff;text-align:center;font-weight:800}
input, button{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ddd;outline:none}
button{background:#6a00ff;color:#fff;font-weight:700;cursor:pointer;border:none}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px}
.admin{background:#fff;padding:10px;margin:10px;border-radius:10px}
.order{background:#fff;margin:10px;padding:10px;border-radius:10px}
</style>
</head>
<body>

<header>EasyBring Mini App 🚀</header>

<div id="app">

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin" style="display:none">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Mahsulot nomi">
<input id="pprice" placeholder="Narxi">
<input id="pimg" placeholder="Rasm URL">
<button onclick="app.addProduct()">Qo‘shish</button>

<h3>Buyurtmalar</h3>
<div id="orders"></div>
</div>

<!-- SHOP GRID -->
<div id="shop" class="grid"></div>

<!-- CHECKOUT -->
<button onclick="app.checkout()">Buyurtma berish</button>

</div>

<script type="module">
// 🔥 FIREBASE
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔑 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

const appF = initializeApp(firebaseConfig);
const db = getFirestore(appF);

// 🤖 TELEGRAM BOT
const TOKEN = "YOUR_BOT_TOKEN";
const CHAT_ID = "YOUR_CHAT_ID";

window.app = {
db: [],
cart: [],
user: null,
role: "user",

init() {
    const tg = window.Telegram.WebApp;
    tg.expand();

    // TG User Info
    const tgUser = tg.initDataUnsafe.user;
    this.user = tgUser;
    this.role = (tgUser.id === 123456789) ? "admin" : "user"; // Admin ID o'zgartir

    // Agar admin bo'lsa panel ko'rsat
    if(this.role === "admin") adminPanel.style.display = "block";

    // Firestore ga user info saqlash
    setDoc(doc(db, "users", tgUser.id.toString()), {
        first_name: tgUser.first_name,
        username: tgUser.username || "",
        role: this.role
    });

    this.loadProducts();
    if(this.role === "admin") this.loadOrders();
},

// 📦 PRODUCTS
async addProduct(){
    const name = pname.value;
    const price = Number(pprice.value);
    const img = pimg.value || 'https://via.placeholder.com/150';

    if(!name || !price) return alert("Ma'lumotlarni to'ldiring!");

    await addDoc(collection(db, "products"), {name, price, img});
    alert("Mahsulot qo‘shildi!");
    pname.value=""; pprice.value=""; pimg.value="";
    this.loadProducts();
},

async loadProducts(){
    const snap = await getDocs(collection(db, "products"));
    this.db = [];
    snap.forEach(d => this.db.push({id: d.id, ...d.data()}));
    this.render();
},

render(){
    shop.innerHTML = this.db.map(x => `
        <div class="card">
            <img src="${x.img}" width="100%">
            <b>${x.name}</b><br>
            ${x.price} so'm<br>
            <button onclick="app.addToCart('${x.id}')">Savatga</button>
        </div>
    `).join("");
},

addToCart(id){
    const item = this.db.find(x => x.id === id);
    const exist = this.cart.find(x => x.id === id);
    if(exist) exist.qty++;
    else this.cart.push({...item, qty:1});
    alert("Savatga qo‘shildi!");
},

// 🛒 CHECKOUT + TELEGRAM
async checkout(){
    if(this.cart.length === 0) {alert("Savat bo‘sh!"); return;}

    let total = 0;
    this.cart.forEach(x => total += x.price * x.qty);

    const order = {
        user: {id:this.user.id, name:this.user.first_name, username:this.user.username},
        items: this.cart,
        total,
        status: "pending",
        time: new Date().toLocaleString()
    };

    await addDoc(collection(db, "orders"), order);

    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({chat_id: CHAT_ID, text: JSON.stringify(order, null, 2)})
    });

    alert("Buyurtma yuborildi!");
    this.cart = [];
},

// 📑 ADMIN ORDERS
async loadOrders(){
    const snap = await getDocs(collection(db, "orders"));
    orders.innerHTML = "";
    snap.forEach(d => {
        const o = d.data();
        orders.innerHTML += `
        <div class="order">
            <b>${o.user.name}</b><br>
            ${o.total} so'm<br>
            Status: ${o.status}<br>
            <button onclick="app.updateStatus('${d.id}','accepted')">Tasdiqlash</button>
            <button onclick="app.updateStatus('${d.id}','delivered')">Yetkazildi</button>
        </div>`;
    });
},

async updateStatus(id, status){
    await updateDoc(doc(db, "orders", id), {status});
    this.loadOrders();
}

};

app.init();
</script>
</body>
</html>
