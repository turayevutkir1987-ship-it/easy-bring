<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EasyBring Mini App PRO</title>

<!-- Telegram Web App JS -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- Firebase JS SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f5f6fa}
header{padding:15px;background:#fff;text-align:center;font-weight:800}
input, button{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:1px solid #ddd;outline:none}
button{background:#6a00ff;color:#fff;font-weight:700;cursor:pointer;border:none}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px}
.admin{background:#fff;padding:10px;margin:10px;border-radius:10px}
.order{background:#fff;margin:10px;padding:10px;border-radius:10px}
</style>
</head>
<body>

<header>EasyBring Mini App 🚀</header>

<div id="app">

<!-- ADMIN PANEL -->
<div id="adminPanel" class="admin" style="display:none">
<h3>Admin Panel</h3>
<input id="pname" placeholder="Mahsulot nomi">
<input id="pprice" placeholder="Narxi">
<input id="pimg" placeholder="Rasm URL">
<button onclick="app.addProduct()">Qo‘shish</button>

<h3>Buyurtmalar</h3>
<div id="orders"></div>
</div>

<!-- SHOP GRID -->
<div id="shop" class="grid"></div>

<!-- CHECKOUT -->
<button onclick="app.checkout()">Buyurtma berish</button>

</div>

<script>
// 🔑 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID"
};

// Initialize Firebase
const appF = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore(appF);

// 🤖 TELEGRAM BOT
const TOKEN = "YOUR_BOT_TOKEN";
const CHAT_ID = "YOUR_CHAT_ID";

window.app = {
db: [],
cart: [],
user: null,
role: "user",

init() {
    const tg = window.Telegram.WebApp;
    tg.expand();

    // TG User Info
    const tgUser = tg.initDataUnsafe.user;
    this.user = tgUser;
    this.role = (tgUser.id === 123456789) ? "admin" : "user"; // Admin ID o'zgartir

    // Admin panelni ko'rsat
    if(this.role === "admin") document.getElementById('adminPanel').style.display = "block";

    // Firestore ga user info saqlash
    db.collection("users").doc(tgUser.id.toString()).set({
        first_name: tgUser.first_name,
        username: tgUser.username || "",
        role: this.role
    });

    this.loadProducts();
    if(this.role === "admin") this.loadOrders();
},

// 📦 PRODUCTS
addProduct(){
    const name = document.getElementById('pname').value;
    const price = Number(document.getElementById('pprice').value);
    const img = document.getElementById('pimg').value || 'https://via.placeholder.com/150';

    if(!name || !price) return alert("Ma'lumotlarni to'ldiring!");

    db.collection("products").add({name, price, img})
    .then(() => {
        alert("Mahsulot qo‘shildi!");
        document.getElementById('pname').value="";
        document.getElementById('pprice').value="";
        document.getElementById('pimg').value="";
        this.loadProducts();
    });
},

loadProducts(){
    db.collection("products").get().then((snap) => {
        this.db = [];
        snap.forEach(d => this.db.push({id:d.id,...d.data()}));
        this.render();
    });
},

render(){
    const shop = document.getElementById('shop');
    shop.innerHTML = this.db.map(x => `
        <div class="card">
            <img src="${x.img}" width="100%">
            <b>${x.name}</b><br>
            ${x.price} so'm<br>
            <button onclick="app.addToCart('${x.id}')">Savatga</button>
        </div>
    `).join("");
},

addToCart(id){
    const item = this.db.find(x => x.id === id);
    const exist = this.cart.find(x => x.id === id);
    if(exist) exist.qty++;
    else this.cart.push({...item, qty:1});
    alert("Savatga qo‘shildi!");
},

// 🛒 CHECKOUT + TELEGRAM
checkout(){
    if(this.cart.length === 0) {alert("Savat bo‘sh!"); return;}

    let total = 0;
    this.cart.forEach(x => total += x.price * x.qty);

    const order = {
        user: {id:this.user.id, name:this.user.first_name, username:this.user.username},
        items: this.cart,
        total,
        status: "pending",
        time: new Date().toLocaleString()
    };

    db.collection("orders").add(order);

    fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({chat_id: CHAT_ID, text: JSON.stringify(order, null, 2)})
    });

    alert("Buyurtma yuborildi!");
    this.cart = [];
},

// 📑 ADMIN ORDERS
loadOrders(){
    db.collection("orders").get().then((snap) => {
        const ordersDiv = document.getElementById('orders');
        ordersDiv.innerHTML = "";
        snap.forEach(d => {
            const o = d.data();
            ordersDiv.innerHTML += `
            <div class="order">
                <b>${o.user.name}</b><br>
                ${o.total} so'm<br>
                Status: ${o.status}<br>
            </div>`;
        });
    });
}

};

app.init();
</script>
</body>
</html>
